# 数据路径
datapath-train: ./skin diseases/train-new
datapath-val: ./skin diseases/val
datapath-test: ./skin diseases/test

# 训练参数
model: efficientnet_b3
batch-size: 16
num-workers: 8
channels-last: true
save-path: ./variables
device: auto
amp: true
log-interval: 100
patience: 15
min-delta: 0.0

# 优化器
optimizer: AdamW
optimizer-params: {}
epochs: 100
lr: 0.001
lr-policy: cosine_lr
warmup-length: 0
lowest-lr: 0.000001
lr-steps: []
lr-gamma: 0.1
weight-decay: 0.001
loss: cross_entropy
cb-loss-type: focal
cb-beta: 0.9999
cb-gamma: 2.0

# 日志
logterminal: true
resume: ''
