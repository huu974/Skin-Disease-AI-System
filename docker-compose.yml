name: skin-ai

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: skin-backend
    ports:
      - "8020:8020"
    environment:
      DASHSCOPE_API_KEY: "sk-b371ebde92284d9ebf00b32645ea6edd"
    working_dir: /app
    command: uvicorn inference_backend.main:app --host 0.0.0.0 --port 8020 --reload

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: skin-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
